services:
  qdrant-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qdrant-mcp
    restart: unless-stopped

    # Host networking — needs access to Qdrant :6333 and Ollama :11434 on localhost
    # NOTE: host networking is Linux only. For macOS/Windows Docker Desktop,
    # replace with port mapping — see README Docker section.
    network_mode: host

    environment:
      - TZ=America/Chicago

    # Resource constraints
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"
